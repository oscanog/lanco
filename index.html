<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/lancotech.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/index.css" />
    <meta
      name="description"
      content="Lancotech helps traders learn, practice, simulate, track, and improve through guided market education."
    />
    <title>Lancotech | Guided Trading Simulation</title>
  </head>
  <body>
    <script>
      // Apply dark mode before React mounts to avoid FOUC
      if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
